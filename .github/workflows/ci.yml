on:
  pull_request:
    branches:
      - main
      - mqtt5-client
    paths:
      - '**.rs'
      - '**.md'
      - 'Cargo.*'
      - '*/Cargo.*'
      - 'benchmarks/**'
      - 'scripts/check-markdown-links.py'
      - '.github/workflows/*'
  push:
    branches:
      - main

name: CI

env:
  RUSTFLAGS: "-D warnings"
  CARGO_INCREMENTAL: 0

defaults:
  run:
    shell: bash

jobs:
  test:
    name: Build and test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15
          - windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check documentation links
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: python3 scripts/check-markdown-links.py

      # use mold linker instead of the default linker only on linux
      - uses: rui314/setup-mold@v1
        if: ${{ runner.os == 'Linux' }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ runner.os }}-cargo

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack,cargo-llvm-cov,nextest

      - name: Install Mosquitto
        if: ${{ runner.os == 'Linux' }}
        run: |
            sudo apt-get update
            sudo apt-get install -y mosquitto

      - name: Check benchmarks
        env:
          RUSTFLAGS: "-D warnings"
        run: |
            cargo check -p benchmarks --all-targets
            cargo clippy -p benchmarks --all-targets -- -D warnings
            cargo test -p benchmarks --test codec_smoke
            python3 -m compileall benchmarks/runner.py
            python3 -m unittest benchmarks/tests/test_runner.py

      - name: Check rumqttc
        env:
          RUSTFLAGS: "-D warnings -W clippy::pedantic -W clippy::nursery"
        run: |
            fix_args=()
            if [[ "${{ runner.os }}" == 'Linux' ]]; then
              fix_args=(--fix --allow-dirty)
            fi
            cargo hack clippy "${fix_args[@]}" --verbose --each-feature --exclude-all-features --no-dev-deps --optional-deps url -p rumqttc-v4-next
            cargo hack clippy "${fix_args[@]}" --verbose --each-feature --exclude-all-features --no-dev-deps --optional-deps url -p rumqttc-v5-next

      - name: Check standalone crates
        env:
          RUSTFLAGS: "-D warnings -W clippy::pedantic -W clippy::nursery"
        run: |
            cargo clippy --fix --allow-dirty --verbose --all-targets -p mqttbytes-core-next
            cargo hack clippy --fix --allow-dirty --verbose --each-feature --exclude-all-features --no-dev-deps -p rumqttc-core-next
            cargo hack clippy --fix --allow-dirty --verbose --each-feature --exclude-all-features --no-dev-deps -p rumqttc-next
            cargo clippy --fix --allow-dirty --verbose --all-targets -p rumqttc-session-store-file-core-next -p rumqttc-v4-session-store-file-next -p rumqttc-v5-session-store-file-next

      - name: Check docs
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
            cargo hack doc --verbose --no-deps --each-feature --exclude-all-features --no-dev-deps --optional-deps url -p rumqttc-v4-next
            cargo hack doc --verbose --no-deps --each-feature --exclude-all-features --no-dev-deps --optional-deps url -p rumqttc-v5-next

      - name: Check standalone crate docs
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
            cargo doc --verbose --no-deps -p mqttbytes-core-next
            cargo hack doc --verbose --no-deps --each-feature --exclude-all-features --no-dev-deps -p rumqttc-core-next
            cargo hack doc --verbose --no-deps --each-feature --exclude-all-features --no-dev-deps -p rumqttc-next
            cargo doc --verbose --no-deps -p rumqttc-session-store-file-core-next -p rumqttc-v4-session-store-file-next -p rumqttc-v5-session-store-file-next

      - name: Doctests
        run: |
            cargo hack --each-feature --exclude-all-features --optional-deps url test --doc -p rumqttc-v4-next
            cargo hack --each-feature --exclude-all-features --optional-deps url test --doc -p rumqttc-v5-next

      - name: Standalone crate doctests
        run: |
            cargo test --doc -p mqttbytes-core-next
            cargo hack --each-feature --exclude-all-features test --doc -p rumqttc-core-next
            cargo hack --each-feature --exclude-all-features test --doc -p rumqttc-next
            cargo test --doc -p rumqttc-session-store-file-core-next -p rumqttc-v4-session-store-file-next -p rumqttc-v5-session-store-file-next

      - name: Test rumqttc
        run: |
            cargo hack --each-feature --exclude-all-features --optional-deps url nextest run -p rumqttc-v4-next
            cargo hack --each-feature --exclude-all-features --optional-deps url nextest run -p rumqttc-v5-next

      - name: Test standalone crates
        run: |
            cargo test -p mqttbytes-core-next
            cargo hack --each-feature --exclude-all-features test -p rumqttc-core-next
            cargo hack --each-feature --exclude-all-features test -p rumqttc-next
            cargo test -p rumqttc-session-store-file-core-next -p rumqttc-v4-session-store-file-next -p rumqttc-v5-session-store-file-next

      - name: Test native-tls WSS integration
        run: |
            cargo test --manifest-path rumqttc-v4/Cargo.toml --no-default-features --features "websocket,use-native-tls" --lib transport::tests::wss_default_config_uses_native_tls_when_rustls_is_disabled -- --exact
            cargo test --manifest-path rumqttc-v5/Cargo.toml --no-default-features --features "websocket,use-native-tls" --lib transport::tests::wss_default_config_uses_native_tls_when_rustls_is_disabled -- --exact
            cargo test --manifest-path rumqttc-v4/Cargo.toml --no-default-features --features "websocket,use-native-tls" --test websocket_integration
            cargo test --manifest-path rumqttc-v5/Cargo.toml --no-default-features --features "websocket,use-native-tls" --test websocket_integration

      - name: Verify rustls provider conflict guard
        run: |
            if cargo check -p rumqttc-v4-next --no-default-features --features "use-rustls-aws-lc,use-rustls-ring"; then
              echo "Expected mutually-exclusive rustls provider feature check for rumqttc-v4-next to fail, but it succeeded."
              exit 1
            fi
            if cargo check -p rumqttc-v5-next --no-default-features --features "use-rustls-aws-lc,use-rustls-ring"; then
              echo "Expected mutually-exclusive rustls provider feature check for rumqttc-v5-next to fail, but it succeeded."
              exit 1
            fi
            echo "Mutually-exclusive rustls provider feature guards failed as expected."

      - name: Verify cross-crate transport feature isolation
        run: |
            cargo check -p rumqttc-v4-next -p rumqttc-v5-next --no-default-features -F rumqttc-v5-next/websocket
            cargo check -p rumqttc-v4-next -p rumqttc-v5-next --no-default-features -F rumqttc-v4-next/websocket
            cargo check -p rumqttc-v4-next -p rumqttc-v5-next --no-default-features --features "rumqttc-v4-next/use-rustls-ring rumqttc-v5-next/use-rustls-aws-lc"
            cargo check -p rumqttc-v4-next -p rumqttc-v5-next --no-default-features --features "rumqttc-v4-next/use-rustls-aws-lc rumqttc-v5-next/use-rustls-ring"

      - name: Verify rumqttc-next feature forwarding
        run: |
            cargo check -p rumqttc-next --no-default-features --features websocket
            cargo check -p rumqttc-next --no-default-features --features use-native-tls
            cargo check -p rumqttc-next --no-default-features --features "auth-scram,url"

      - name: Check workspace
        run: |
          cargo check --workspace
          cargo check -p rumqttc-v4-session-store-file-next --example persistent_session_file_store
          cargo check -p rumqttc-v5-session-store-file-next --example persistent_session_file_store_v5

  msrv-session-store:
    name: Session stores on Rust 1.89
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.89
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: Linux-cargo-msrv-session-store
      - run: |
          cargo check -p rumqttc-session-store-file-core-next -p rumqttc-v4-session-store-file-next -p rumqttc-v5-session-store-file-next
          cargo check -p rumqttc-session-store-file-core-next --target wasm32-unknown-unknown

  benchmark-broker-fixture:
    name: Benchmark broker fixture
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: Linux-cargo-benchmark-fixture

      - name: Check benchmark fixture
        env:
          RUSTFLAGS: "-D warnings"
        run: |
            cargo check -p benchmarks --features websocket --all-targets
            python3 -m compileall benchmarks/runner.py benchmarks/broker_fixture.py
            python3 -m unittest benchmarks/tests/test_runner.py benchmarks/tests/test_broker_fixture.py

      - name: Validate websocket benchmark scenarios
        env:
          RUSTFLAGS: "-D warnings"
        run: |
            python3 benchmarks/broker_fixture.py validate \
              --transport websocket \
              --scenario client-v4-throughput-websocket-qos1-1kib-1p1s \
              --scenario client-v5-throughput-websocket-qos1-1kib-1p1s \
              --runs 1 \
              --warmup-runs 0 \
              --cargo-profile dev \
              --output-dir /tmp/rumqtt-bench-websocket-fixture

  coverage:
    name: Test coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: Linux-cargo-coverage

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack,cargo-llvm-cov,nextest

      - name: Install Mosquitto
        run: |
            sudo apt-get update
            sudo apt-get install -y mosquitto

      - name: Generate coverage report
        run: |
            cargo llvm-cov clean --workspace
            cargo hack --each-feature --exclude-all-features --optional-deps url llvm-cov --no-clean -p rumqttc-v4-next nextest
            cargo hack --each-feature --exclude-all-features --optional-deps url llvm-cov --no-clean -p rumqttc-v5-next nextest
            cargo llvm-cov report --lcov --output-path coverage.lcov

      - name: Upload coverage report
        uses: coverallsapp/github-action@v2.2.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: ./coverage.lcov
