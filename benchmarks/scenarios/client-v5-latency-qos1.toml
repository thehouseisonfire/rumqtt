name = "client-v5-latency-qos1"
group = "client"
command = "latency"
description = "MQTT 5 QoS 1 publish/subscribe end-to-end latency through an external broker."
primary_metric = "p99"
higher_is_better = false
requires_broker = true

[quality]
min_success_rate = 0.95
min_measured_runs = 5
max_primary_cv_pct = 35.0
max_primary_mad_pct = 20.0
max_relative_ci_width_pct = 35.0

[args]
protocol = "v5"
duration_sec = 10
warmup_sec = 2
payload_size = 64
qos = 1
topic = "bench/latency/v5"
rate = 1000
