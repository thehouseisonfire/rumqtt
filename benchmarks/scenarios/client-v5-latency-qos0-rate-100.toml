name = "client-v5-latency-qos0-rate-100"
group = "client"
command = "latency"
description = "MQTT 5 QoS 0 p50/p95/p99 latency at 100 publishes per second."
primary_metric = "p99_us"
higher_is_better = false
requires_broker = true
transport = "tcp"

[quality]
min_success_rate = 0.95
min_measured_runs = 5
max_primary_cv_pct = 35.0
max_primary_mad_pct = 20.0
max_relative_ci_width_pct = 35.0

[args]
protocol = "v5"
duration_sec = 10
warmup_sec = 2
payload_size = 64
qos = 0
topic = "bench/latency/v5/qos0/rate-100"
rate = 100
