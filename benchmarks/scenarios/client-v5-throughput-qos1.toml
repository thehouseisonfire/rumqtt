name = "client-v5-throughput-qos1"
group = "client"
command = "throughput"
description = "MQTT 5 QoS 1 publish/subscribe throughput through an external TCP broker."
primary_metric = "throughput_msg_sec"
higher_is_better = true
requires_broker = true
transport = "tcp"

[quality]
min_success_rate = 0.95
min_measured_runs = 5
max_primary_cv_pct = 25.0
max_primary_mad_pct = 15.0
max_relative_ci_width_pct = 25.0

[args]
protocol = "v5"
duration_sec = 10
warmup_sec = 2
payload_size = 64
qos = 1
topic = "bench/throughput/v5"
publishers = 1
subscribers = 1
