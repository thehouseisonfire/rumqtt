name = "client-v4-latency-qos1-rate-1000"
group = "client"
command = "latency"
description = "MQTT 3.1.1 QoS 1 p50/p95/p99 latency at 1000 publishes per second."
primary_metric = "p99_us"
higher_is_better = false
requires_broker = true
transport = "tcp"

[quality]
min_success_rate = 0.95
min_measured_runs = 5
max_primary_cv_pct = 35.0
max_primary_mad_pct = 20.0
max_relative_ci_width_pct = 35.0

[args]
protocol = "v4"
duration_sec = 10
warmup_sec = 2
payload_size = 64
qos = 1
topic = "bench/latency/v4/qos1/rate-1000"
rate = 1000
