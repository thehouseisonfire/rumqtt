name = "client-v4-connections-tcp"
group = "client"
command = "connections"
description = "MQTT 3.1.1 TCP connect/disconnect churn against an external broker."
primary_metric = "connections_sec"
higher_is_better = true
requires_broker = true
transport = "tcp"

[quality]
min_success_rate = 0.95
min_measured_runs = 5
max_primary_cv_pct = 30.0
max_primary_mad_pct = 20.0
max_relative_ci_width_pct = 30.0

[args]
protocol = "v4"
duration_sec = 10
concurrency = 10
