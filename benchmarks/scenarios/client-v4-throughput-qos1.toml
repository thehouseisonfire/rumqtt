name = "client-v4-throughput-qos1"
group = "client"
command = "throughput"
description = "MQTT 3.1.1 QoS 1 publish/subscribe throughput through an external broker."
primary_metric = "throughput_msg_sec"
higher_is_better = true
requires_broker = true

[args]
protocol = "v4"
duration_sec = 10
warmup_sec = 2
payload_size = 64
qos = 1
topic = "bench/throughput/v4"
publishers = 1
subscribers = 1
