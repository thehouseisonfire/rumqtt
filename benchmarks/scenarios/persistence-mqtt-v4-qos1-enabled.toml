name = "persistence-mqtt-v4-qos1-enabled"
group = "persistence"
command = "mqtt"
description = "MQTT 3.1.1 QoS 1 tracked publish workload with durable persistence"
primary_metric = "throughput_msg_sec"
higher_is_better = true
requires_broker = true
transport = "tcp"

[args]
protocol = "v4"
persistence = "enabled"
messages = 100
warmup_messages = 10
inflight = 10
payload_size = 1024
qos = 1

[quality]
min_success_rate = 1.0
min_measured_runs = 3
max_primary_cv_pct = 30.0
max_primary_mad_pct = 20.0
max_relative_ci_width_pct = 40.0
