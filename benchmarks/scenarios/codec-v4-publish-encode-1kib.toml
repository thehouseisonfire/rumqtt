name = "codec-v4-publish-encode-1kib"
group = "codec"
command = "encode"
description = "MQTT 3.1.1 publish packet encode throughput with a 1024 byte payload."
primary_metric = "messages_sec"
higher_is_better = true
requires_broker = false

[quality]
min_success_rate = 1.0
min_measured_runs = 5
max_primary_cv_pct = 10.0
max_primary_mad_pct = 5.0
max_relative_ci_width_pct = 10.0

[args]
protocol = "v4"
messages = 50000
payload_size = 1024
qos = 1
topic = "bench/codec/v4/encode/1kib"
