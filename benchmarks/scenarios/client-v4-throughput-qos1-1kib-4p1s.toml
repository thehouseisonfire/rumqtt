name = "client-v4-throughput-qos1-1kib-4p1s"
group = "client"
command = "throughput"
description = "MQTT 3.1.1 QoS 1 throughput with 4 publisher(s) and 1 subscriber(s)."
primary_metric = "throughput_msg_sec"
higher_is_better = true
requires_broker = true
transport = "tcp"

[quality]
min_success_rate = 0.95
min_measured_runs = 5
max_primary_cv_pct = 25.0
max_primary_mad_pct = 15.0
max_relative_ci_width_pct = 25.0

[args]
protocol = "v4"
duration_sec = 10
warmup_sec = 2
payload_size = 1024
qos = 1
topic = "bench/throughput/v4/qos1/1kib/4p1s"
publishers = 4
subscribers = 1
