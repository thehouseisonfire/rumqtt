name = "client-v5-throughput-qos0-16kib-1p1s"
group = "client"
command = "throughput"
description = "MQTT 5 QoS 0 1 publisher/1 subscriber throughput with a 16384 byte payload."
primary_metric = "throughput_msg_sec"
higher_is_better = true
requires_broker = true
transport = "tcp"

[quality]
min_success_rate = 0.95
min_measured_runs = 5
max_primary_cv_pct = 25.0
max_primary_mad_pct = 15.0
max_relative_ci_width_pct = 25.0

[args]
protocol = "v5"
duration_sec = 10
warmup_sec = 2
payload_size = 16384
qos = 0
topic = "bench/throughput/v5/qos0/16kib/1p1s"
publishers = 1
subscribers = 1
