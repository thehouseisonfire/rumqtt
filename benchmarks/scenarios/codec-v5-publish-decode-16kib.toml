name = "codec-v5-publish-decode-16kib"
group = "codec"
command = "decode"
description = "MQTT 5 publish packet decode throughput with a 16384 byte payload."
primary_metric = "messages_sec"
higher_is_better = true
requires_broker = false

[quality]
min_success_rate = 1.0
min_measured_runs = 5
max_primary_cv_pct = 10.0
max_primary_mad_pct = 5.0
max_relative_ci_width_pct = 10.0

[args]
protocol = "v5"
messages = 10000
payload_size = 16384
qos = 1
topic = "bench/codec/v5/decode/16kib"
