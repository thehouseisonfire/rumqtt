name = "codec-v5-publish-roundtrip-1kib"
group = "codec"
command = "roundtrip"
description = "MQTT 5 publish packet roundtrip throughput with a 1024 byte payload."
primary_metric = "messages_sec"
higher_is_better = true
requires_broker = false

[quality]
min_success_rate = 1.0
min_measured_runs = 5
max_primary_cv_pct = 10.0
max_primary_mad_pct = 5.0
max_relative_ci_width_pct = 10.0

[args]
protocol = "v5"
messages = 50000
payload_size = 1024
qos = 1
topic = "bench/codec/v5/roundtrip/1kib"
