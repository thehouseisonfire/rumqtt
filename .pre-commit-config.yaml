repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: >
          bash -c '
          set -euo pipefail;
          cargo fmt --all
          '
        language: system
        pass_filenames: false
        always_run: false
        require_serial: true

      - id: clippy
        name: clippy
        entry: >
          bash -c '
          set -euo pipefail;
          export CARGO_BUILD_JOBS="${CARGO_BUILD_JOBS:-6}";
          export RUSTFLAGS="-D warnings -W clippy::pedantic -W clippy::nursery";
          cargo hack clippy --fix --allow-dirty
          --each-feature
          --exclude-all-features
          --no-dev-deps
          --optional-deps url
          -p rumqttc-v4-next
          -p rumqttc-v5-next
          '
        language: system
        pass_filenames: false
        always_run: false
        require_serial: true

      - id: clippy-workspace
        name: clippy workspace
        entry: >
          bash -c '
          set -euo pipefail;
          cargo clippy --workspace --lib -- \
            -D clippy::dbg_macro \
            -D clippy::todo \
            -D clippy::exit \
            -D clippy::clone_on_ref_ptr \
            -D clippy::empty_drop \
            -D clippy::let_underscore_must_use \
            -D clippy::unused_result_ok \
            -D clippy::undocumented_unsafe_blocks \
            -D clippy::unwrap_in_result \
            -D clippy::panic_in_result_fn \
            -D clippy::mem_forget \
            -D clippy::rest_pat_in_fully_bound_structs \
            -D clippy::string_slice \
            -D clippy::iter_over_hash_type \
            -D clippy::host_endian_bytes \
            -D clippy::little_endian_bytes \
            -D clippy::mixed_read_write_in_expression \
            -D clippy::suspicious_xor_used_as_pow \
            -D clippy::fn_to_numeric_cast_any \
            -D clippy::await_holding_lock \
            -D clippy::await_holding_refcell_ref \
            -D clippy::future_not_send \
            -D clippy::large_futures \
            -D clippy::large_stack_frames \
            -D clippy::large_enum_variant \
            -D clippy::mutex_atomic \
            -D clippy::rc_mutex \
            -D clippy::multiple_crate_versions
          '
        language: system
        pass_filenames: false
        always_run: false
        require_serial: true

      - id: tests
        name: tests
        entry: >
          bash -c '
          set -euo pipefail;
          export CARGO_BUILD_JOBS="${CARGO_BUILD_JOBS:-6}";
          cargo hack
          --each-feature
          --exclude-all-features
          --optional-deps url
          test
          -p rumqttc-v4-next
          -p rumqttc-v5-next
          '
        language: system
        pass_filenames: false
        always_run: false
        require_serial: true

      - id: combo-tests
        name: combo tests
        entry: >
          bash -c '
          set -euo pipefail;
          export CARGO_BUILD_JOBS="${CARGO_BUILD_JOBS:-6}";

          cargo test -p rumqttc-v4-next --no-default-features --features "websocket,use-rustls-ring";
          cargo test -p rumqttc-v5-next --no-default-features --features "websocket,use-rustls-ring";
          cargo test -p rumqttc-v4-next --no-default-features --features "websocket,use-rustls-aws-lc";
          cargo test -p rumqttc-v5-next --no-default-features --features "websocket,use-rustls-aws-lc";
          cargo test -p rumqttc-v4-next --no-default-features --features "websocket,use-native-tls" --lib transport::tests::wss_default_config_uses_native_tls_when_rustls_is_disabled -- --exact;
          cargo test -p rumqttc-v5-next --no-default-features --features "websocket,use-native-tls" --lib transport::tests::wss_default_config_uses_native_tls_when_rustls_is_disabled -- --exact;
          '
        language: system
        pass_filenames: false
        always_run: false
        require_serial: true

      - id: rustls-conflict-guard
        name: rustls conflict guard
        entry: >
          bash -c '
          set -euo pipefail;
          export CARGO_BUILD_JOBS="${CARGO_BUILD_JOBS:-6}";

          if cargo check -p rumqttc-v4-next --no-default-features --features "use-rustls-aws-lc,use-rustls-ring" 2>/dev/null; then
            echo "ERROR - rumqttc-v4-next rustls provider conflict guard failed";
            exit 1;
          fi;

          if cargo check -p rumqttc-v5-next --no-default-features --features "use-rustls-aws-lc,use-rustls-ring" 2>/dev/null; then
            echo "ERROR - rumqttc-v5-next rustls provider conflict guard failed";
            exit 1;
          fi;
          '
        language: system
        pass_filenames: false
        always_run: false
        require_serial: true
